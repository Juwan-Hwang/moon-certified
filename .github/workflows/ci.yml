name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit (pinned version)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | MOONBIT_VERSION=0.1.20260713 bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: MoonBit version
        run: moon version

      - name: Type check (0 warnings required)
        run: moon check --deny-warn

      - name: Run tests
        run: moon test

  prove:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit (pinned version)
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | MOONBIT_VERSION=0.1.20260713 bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install Z3
        run: |
          pip3 install z3-solver==4.12.6.0
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Install OCaml and Why3
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq opam libgmp-dev pkg-config
          opam init -y --disable-sandboxing --no-setup
          opam install -y why3.1.7.2
          echo "$HOME/.opam/default/bin" >> $GITHUB_PATH

      - name: Configure Why3
        run: why3 config detect

      - name: Run formal verification
        run: moon prove
